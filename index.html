<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--white:#ffffff;
  --gray-100:#f8f8f8;--gray-200:#f0f0f0;--gray-300:#e8e8e8;
  --gray-400:#d0d0d0;--gray-500:#aaaaaa;--gray-600:#888888;--gray-700:#555555;
  --border-strong:1.5px solid #0a0a0a;
  --border-soft:1px solid #e8e8e8;
  --border-muted:1px solid #f0f0f0;
  --radius-sm:6px;--radius-md:8px;--radius-lg:10px;
  --font:'Space Grotesk',system-ui,sans-serif;
  --nav-h:54px;--panel:320px;
  --trans:all 0.15s ease;
}
html{font-size:14px}
html,body{width:100%;height:100%;overflow:hidden;background:var(--white)}
body{font-family:var(--font);color:var(--black);line-height:1.5;-webkit-font-smoothing:antialiased}
canvas{display:block}

/* ── Layout ── */
#app{display:grid;grid-template-rows:var(--nav-h) 1fr;grid-template-columns:1fr var(--panel);height:100vh;width:100vw}

/* ── Nav — idéntico a Umbral ── */
#nav{
  grid-column:1/-1;
  display:flex;align-items:center;gap:16px;
  padding:0 20px;
  border-bottom:var(--border-strong);
  background:var(--white);z-index:9000;
  height:var(--nav-h);
}
#nav-logo{
  display:flex;align-items:center;gap:10px;
  text-decoration:none;color:var(--black);
  font-size:13px;font-weight:700;letter-spacing:.02em;
  white-space:nowrap;flex-shrink:0;
  padding-right:16px;border-right:var(--border-soft);height:100%;
}
#nav-links{display:flex;align-items:center;height:100%;gap:4px;flex:1}
.nav-mod{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;text-decoration:none;
  color:var(--gray-600);font-size:11px;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;
  border-radius:var(--radius-sm);
  transition:var(--trans);white-space:nowrap;height:34px;
}
.nav-mod:hover{color:var(--black);background:var(--gray-200)}
.nav-mod.active{color:var(--black);background:var(--gray-200)}
.nav-back{
  display:inline-flex;align-items:center;gap:10px;
  padding:8px 16px;background:var(--black);color:var(--white);
  font-family:var(--font);font-size:12px;font-weight:500;
  letter-spacing:.01em;border-radius:var(--radius-md);
  border:none;cursor:pointer;text-decoration:none;
  white-space:nowrap;flex-shrink:0;margin-left:auto;
  transition:var(--trans);
}
.nav-back:hover{opacity:.85}

/* ── Canvas ── */
#canvas-wrap{position:relative;grid-column:1;grid-row:2;overflow:hidden;background:var(--white)}
#c{display:block;width:100%;height:100%}

/* ── Layer buttons — usa .layer-btn de Umbral ── */
#layers{position:absolute;top:14px;left:14px;display:flex;flex-direction:column;gap:4px}
.lb{
  display:inline-flex;align-items:center;gap:7px;padding:7px 12px;
  font-family:var(--font);font-size:10px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;
  border:1.5px solid var(--gray-400);border-radius:var(--radius-md);
  background:var(--white);color:var(--gray-500);
  cursor:pointer;transition:var(--trans);white-space:nowrap;
}
.lb:hover{border-color:var(--gray-500);color:var(--black)}
.lb.active{border-color:var(--black);color:var(--black);background:var(--gray-100)}

#hint{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  font-family:var(--font);font-size:10px;font-weight:500;
  color:var(--gray-500);letter-spacing:.03em;
  pointer-events:none;white-space:nowrap;
}

/* ── Panel flotante de zona ── */
#zona-float{
  position:absolute;bottom:42px;right:14px;
  width:248px;max-height:62vh;
  background:var(--white);
  border:var(--border-strong);
  border-radius:var(--radius-lg);
  box-shadow:0 8px 32px rgba(0,0,0,.1);
  display:none;flex-direction:column;overflow:hidden;z-index:50;
}
#zona-float-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:14px 16px 10px;border-bottom:var(--border-soft);flex-shrink:0;
}
#zona-float-nombre{font-size:14px;font-weight:700;line-height:1.2;letter-spacing:-.02em}
#zona-float-sub{font-size:10px;font-weight:500;color:var(--gray-500);margin-top:2px;letter-spacing:.02em}
#zona-float-close{
  font-size:16px;color:var(--gray-500);
  cursor:pointer;border:none;background:none;padding:0 0 0 8px;
  line-height:1;flex-shrink:0;margin-top:-2px;font-weight:300;
}
#zona-float-close:hover{color:var(--black)}
#zona-float-scroll{overflow-y:auto;padding:14px 16px 16px;flex:1}
#zona-float-scroll::-webkit-scrollbar{width:3px}
#zona-float-scroll::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px}
.zf-params{margin-bottom:14px}
.zf-param-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:var(--border-muted)}
.zf-param-row:last-child{border:none}
.zf-param-k{font-size:10px;font-weight:600;color:var(--gray-500);letter-spacing:.05em;text-transform:uppercase}
.zf-param-v{font-size:11px;font-weight:700;color:var(--black)}
.zf-bloque{margin-bottom:12px}
.zf-tag{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-500);margin-bottom:4px}
.zf-txt{font-size:11px;line-height:1.65;color:var(--gray-700)}
.zf-tension{margin-top:12px;padding:10px 12px;background:var(--gray-100);border-left:2px solid var(--black);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.zf-tension-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-500);margin-bottom:5px}
.zf-tension-txt{font-size:11px;line-height:1.6;color:var(--gray-600);font-style:italic}

/* ── Panel lateral ── */
#panel{
  grid-column:2;grid-row:2;
  border-left:var(--border-soft);
  background:var(--white);
  display:flex;flex-direction:column;overflow:hidden;
}

/* Leyenda */
#legend{padding:16px 16px 14px;border-bottom:var(--border-soft);flex-shrink:0}
#legend-title{
  font-size:10px;font-weight:700;color:var(--gray-500);
  letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;
}
.leg-item{display:flex;align-items:center;gap:8px;padding:2px 0}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg-label{font-size:11px;font-weight:600;color:var(--gray-700)}

/* Scroll */
#info-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--gray-300) transparent}
#info-scroll::-webkit-scrollbar{width:3px}
#info-scroll::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px}

/* Narrativa de capa */
#capa-narrativa{padding:18px 16px;border-bottom:var(--border-soft)}
.cap-eyebrow{
  font-size:10px;font-weight:600;color:var(--gray-500);
  letter-spacing:.08em;text-transform:uppercase;
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.cap-eyebrow::before{content:'';display:inline-block;width:16px;height:1.5px;background:var(--black)}
.cap-titulo{
  font-size:16px;font-weight:700;color:var(--black);
  line-height:1.15;margin-bottom:14px;letter-spacing:-.025em;
}
.cap-cuerpo{
  font-size:12px;line-height:1.7;color:var(--gray-700);
  margin-bottom:10px;font-weight:400;
}
.cap-cuerpo strong{color:var(--black);font-weight:600}
.cap-tension{
  margin-top:16px;padding:12px 14px;
  background:var(--gray-100);
  border-left:2px solid var(--black);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
}
.cap-tension-label{
  font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--gray-500);margin-bottom:6px;
}
.cap-tension-texto{font-size:11px;line-height:1.65;color:var(--gray-600);font-style:italic}

/* Footer panel */
#panel-footer{
  padding:12px 16px;border-top:var(--border-soft);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
#panel-footer span{font-size:10px;font-weight:500;color:var(--gray-500);letter-spacing:.03em}
#panel-footer a{
  font-size:10px;font-weight:700;color:var(--black);
  text-decoration:none;letter-spacing:.04em;text-transform:uppercase;
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px;background:var(--gray-100);
  border-radius:var(--radius-sm);transition:var(--trans);
}
#panel-footer a:hover{background:var(--black);color:var(--white)}

@media(max-width:768px){
  :root{--panel:100%}
  #app{grid-template-rows:var(--nav-h) 55vh 1fr;grid-template-columns:1fr}
  #canvas-wrap{grid-column:1;grid-row:2}
  #panel{grid-column:1;grid-row:3;border-left:none;border-top:var(--border-strong)}
  #panel-footer{display:none}
  #nav-links{display:none}
  /* Simulador mobile — más alto para que quepa el contenido */
  #sim-overlay{height:55%}
  #sim-content{flex-direction:column}
  #sim-left{border-right:none;border-bottom:var(--border-soft);max-height:180px}
  #sim-right{width:100%;max-height:200px}
  /* Panel flotante en mobile — abajo izquierda */
  #zona-float{right:auto;left:8px;bottom:8px;width:calc(100vw - 16px);max-width:320px;max-height:50vh}
  /* Layers más compactos */
  #layers{top:8px;left:8px;gap:3px}
  .lb{padding:5px 8px;font-size:9px}
}

/* ── Simulador ── */
#sim-panel{display:none;flex-direction:column;height:100%}
#sim-header{
  padding:16px 16px 14px;border-bottom:var(--border-soft);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
#sim-header-left{}
#sim-eyebrow{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-500);margin-bottom:4px;display:flex;align-items:center;gap:8px}
#sim-eyebrow::before{content:'';display:inline-block;width:14px;height:1.5px;background:var(--black)}
#sim-titulo{font-size:15px;font-weight:700;color:var(--black);letter-spacing:-.02em;line-height:1.2}
#sim-close{
  padding:6px 10px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  border:var(--border-strong);border-radius:var(--radius-sm);
  background:var(--white);color:var(--black);cursor:pointer;transition:var(--trans);flex-shrink:0;
}
#sim-close:hover{background:var(--black);color:var(--white)}

#sim-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--gray-300) transparent}
#sim-body::-webkit-scrollbar{width:3px}
#sim-body::-webkit-scrollbar-thumb{background:var(--gray-300)}

/* Slider control */
.sim-control{background:var(--gray-100);border-radius:var(--radius-md);padding:14px}
.sim-control-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-500);margin-bottom:4px}
.sim-control-val{font-size:20px;font-weight:700;color:var(--black);letter-spacing:-.03em;margin-bottom:12px;line-height:1}
.sim-control-val span{font-size:12px;font-weight:500;color:var(--gray-500);letter-spacing:0}
.sim-slider{
  width:100%;height:4px;border-radius:2px;
  -webkit-appearance:none;appearance:none;
  background:var(--gray-300);outline:none;cursor:pointer;
}
.sim-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:16px;height:16px;border-radius:50%;
  background:var(--black);cursor:pointer;
  border:2px solid var(--white);box-shadow:0 0 0 1.5px var(--black);
}
.sim-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--black);cursor:pointer;border:2px solid var(--white)}
.sim-ticks{display:flex;justify-content:space-between;margin-top:6px}
.sim-tick{font-size:9px;font-weight:600;color:var(--gray-500);letter-spacing:.03em}
.sim-tick.active{color:var(--black)}

/* Zona badge */
.sim-zona-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:var(--border-muted)}
.sim-zona-row:last-child{border:none}
.sim-zona-badge{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.sim-zona-label{font-size:10px;font-weight:600;color:var(--gray-500);letter-spacing:.04em;text-transform:uppercase;flex:1}
.sim-zona-val{font-size:12px;font-weight:700;color:var(--black)}
.sim-zona-arrow{font-size:11px;color:var(--gray-400);margin:0 4px}
.sim-zona-val-new{font-size:12px;font-weight:700}

/* Métricas */
.sim-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sim-metric{background:var(--gray-100);border-radius:var(--radius-sm);padding:10px 12px}
.sim-metric-label{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-500);margin-bottom:4px}
.sim-metric-val{font-size:18px;font-weight:700;color:var(--black);letter-spacing:-.03em;line-height:1}
.sim-metric-sub{font-size:9px;font-weight:500;color:var(--gray-500);margin-top:2px}
.sim-metric.highlight{background:var(--black)}
.sim-metric.highlight .sim-metric-label{color:rgba(255,255,255,.5)}
.sim-metric.highlight .sim-metric-val{color:var(--white)}
.sim-metric.highlight .sim-metric-sub{color:rgba(255,255,255,.4)}

/* Alerta de transporte */
.sim-alert{
  padding:10px 12px;border-radius:var(--radius-sm);
  border-left:2px solid var(--black);background:var(--gray-100);
}
.sim-alert-label{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gray-500);margin-bottom:4px}
.sim-alert-txt{font-size:11px;line-height:1.6;color:var(--gray-700)}


#btn-simular{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;font-size:10px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;
  border:var(--border-strong);border-radius:var(--radius-sm);
  background:var(--black);color:var(--white);
  cursor:pointer;transition:var(--trans);font-family:var(--font);
}
#btn-simular:hover{opacity:.85}

/* ── Simulador overlay (slide desde abajo del canvas) ── */
#sim-overlay{
  position:absolute;bottom:0;left:0;right:0;height:46%;
  background:var(--white);border-top:var(--border-strong);
  display:none;flex-direction:column;z-index:80;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -4px 24px rgba(0,0,0,.1);
}
#sim-overlay.visible{transform:translateY(0)}
#sim-drag-handle{width:36px;height:3px;background:var(--gray-300);border-radius:2px;margin:8px auto 0;flex-shrink:0}
#sim-top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 20px 10px;border-bottom:var(--border-soft);flex-shrink:0;
}
#sim-eyebrow{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-500)}
#sim-titulo{font-size:14px;font-weight:700;color:var(--black);letter-spacing:-.02em;line-height:1.2}
#sim-close-btn{
  padding:6px 12px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  border:var(--border-strong);border-radius:var(--radius-sm);
  background:var(--white);color:var(--black);cursor:pointer;transition:var(--trans);font-family:var(--font);flex-shrink:0;
}
#sim-close-btn:hover{background:var(--black);color:var(--white)}
#sim-content{display:flex;flex:1;overflow:hidden}
#sim-left{flex:1;display:flex;flex-direction:column;padding:10px 16px;border-right:var(--border-soft);overflow:hidden;min-width:0}
#sim-right{width:220px;flex-shrink:0;padding:12px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
#sim-right::-webkit-scrollbar{width:2px}
#sim-right::-webkit-scrollbar-thumb{background:var(--gray-300)}
#sim-slider-label{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gray-500);margin-bottom:6px}
#sim-tipo-btns{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.sim-tipo-btn{
  padding:5px 10px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  border:1.5px solid var(--gray-400);border-radius:var(--radius-sm);
  background:var(--white);color:var(--gray-500);cursor:pointer;transition:var(--trans);font-family:var(--font);
  display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.2;
}
.sim-tipo-btn span{font-size:8px;font-weight:500;color:var(--gray-500);text-transform:none;letter-spacing:0}
.sim-tipo-btn:hover{border-color:var(--gray-500);color:var(--black)}
.sim-tipo-btn.active{border-color:var(--black);color:var(--black);background:var(--gray-100)}
.sim-tipo-btn.active span{color:var(--gray-600)}
#sim-svg-wrap{flex:1;display:flex;align-items:center;min-height:0}
#sim-svg{width:100%;height:100%;max-height:175px}
#sim-zona-badge-wrap{display:flex;align-items:center;gap:8px}
#sim-zona-badge{width:12px;height:12px;border-radius:3px;flex-shrink:0}
#sim-zona-nombre{font-size:12px;font-weight:700;letter-spacing:-.01em}
.sim-met-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:var(--border-muted)}
.sim-met-row:last-child{border:none}
.sim-met-k{font-size:10px;font-weight:600;color:var(--gray-500);letter-spacing:.03em}
.sim-met-v{font-size:12px;font-weight:700;color:var(--black)}
.sim-danger{color:#d42018}.sim-warn{color:#f07820}
#sim-alerta{padding:10px 12px;background:var(--gray-100);border-left:2px solid var(--black);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.sim-alerta-label{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gray-500);margin-bottom:5px}
.sim-alerta-txt{font-size:10.5px;line-height:1.6;color:var(--gray-700)}

/* Usos permitidos */
.sim-usos-wrap{padding:8px 0;border-bottom:var(--border-muted)}
.sim-usos{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.sim-uso{font-size:9px;font-weight:600;letter-spacing:.03em;padding:3px 7px;border-radius:var(--radius-sm);background:var(--gray-200);color:var(--gray-700);border:var(--border-muted)}

/* Base de cálculo */
.sim-base-calc{padding:8px 10px;margin:8px 0 4px;background:var(--gray-100);border-radius:var(--radius-sm)}
.sim-base-label{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gray-500);margin-bottom:3px}
.sim-base-txt{font-size:10px;line-height:1.5;color:var(--gray-600)}

/* Comparativa G2 vs G3 */
.sim-g2g3{padding:10px 12px;margin-top:4px;border:1.5px solid var(--gray-300);border-radius:var(--radius-md)}
.sim-g2g3-label{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gray-500);margin-bottom:5px}
.sim-g2g3-txt{font-size:10px;line-height:1.55;color:var(--gray-700);margin-bottom:10px}
.sim-g2g3-compare{display:flex;align-items:center;justify-content:center;gap:10px}
.sim-g2g3-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.sim-g2g3-zona{width:100%;text-align:center;padding:4px 0;font-size:11px;font-weight:700;color:var(--black);border-radius:var(--radius-sm);margin-bottom:2px}
.sim-g2g3-stat{font-size:10px;font-weight:600;color:var(--gray-600)}
.sim-g2g3-arrow{font-size:16px;color:var(--gray-400);flex-shrink:0}
</style>
</head>
<body>
<div id="app">

<script>
// Simular progreso de carga
let prog=0;
const bar=document.getElementById('loading-bar');
const txt=document.getElementById('loading-txt');
const msgs=['Trazando calles…','Construyendo manzanas…','Plantando árboles…','Ciudad lista'];
const loadInterval=setInterval(()=>{
  prog=Math.min(prog+Math.random()*18,90);
  bar.style.width=prog+'%';
  txt.textContent=msgs[Math.floor(prog/25)]||msgs[0];
},120);
window._loadDone=function(){
  clearInterval(loadInterval);
  bar.style.width='100%';
  setTimeout(()=>{
    const ls=document.getElementById('loading-screen');
    ls.style.opacity='0';ls.style.transition='opacity .4s';
    setTimeout(()=>ls.remove(),400);
  },200);
};
</script>

function pr(a,b,c=0){let s=(a*73856093)^(b*19349663)^(c*83492791);s=((s>>16)^s)*0x45d9f3b;s=((s>>16)^s)*0x45d9f3b;s=(s>>16)^s;return(s>>>0)/4294967296;}
function prR(mn,mx,a,b,c=0){return mn+(mx-mn)*pr(a,b,c);}

function mkBox(x,y,z,w,h,d,col,cast=true){
  const geo=new THREE.BoxGeometry(w,h,d);
  const mat=new THREE.MeshLambertMaterial({color:col});
  const m=new THREE.Mesh(geo,mat);
  m.position.set(x,y+h/2,z);
  if(cast&&!isMobile){m.castShadow=true;m.receiveShadow=true;}
  scene.add(m);
  if(!isMobile){
    const ed=new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:EDGE,transparent:true,opacity:.28}));
    ed.position.copy(m.position);scene.add(ed);
  }
  return m;
}
function mkFloor(x,z,w,d,col,y=0.01){
  const mat=new THREE.MeshLambertMaterial({color:col});
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),mat);
  m.rotation.x=-Math.PI/2;m.position.set(x,y,z);m.receiveShadow=true;scene.add(m);
  if(col!==0xffffff&&col!==0xfafafa&&col!==0xf8f8f8&&col!==0xf5f5f5&&col!==0xf0f0f0)
    neutralMats.push({mat,orig:col});
  return m;
}
function mkBoxGhost(x,y,z,w,h,d,op=1){
  const geo=new THREE.BoxGeometry(w,h,d);
  const m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:0xffffff,transparent:op<1,opacity:op}));
  m.position.set(x,y+h/2,z);m.castShadow=true;m.receiveShadow=true;scene.add(m);
  const ed=new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:EDGE_G,transparent:true,opacity:.2*op}));
  ed.position.copy(m.position);scene.add(ed);
  return m;
}
function mkTree(x,z,seed,sc=1){
  const h=(.45+pr(seed,1)*.45)*sc;
  const tMat=new THREE.MeshLambertMaterial({color:0x7a5230});
  const trunk=new THREE.Mesh(new THREE.BoxGeometry(.07*sc,h*.38,.07*sc),tMat);
  trunk.position.set(x,h*.19,z);trunk.castShadow=true;scene.add(trunk);
  neutralMats.push({mat:tMat,orig:0x7a5230});
  const cCol=pr(seed,3)>.5?0x2d7a2d:0x236623;
  const cMat=new THREE.MeshLambertMaterial({color:cCol});
  const crown=new THREE.Mesh(new THREE.SphereGeometry((.2+pr(seed,2)*.12)*sc,6,5),cMat);
  crown.position.set(x,h*.6,z);crown.castShadow=true;scene.add(crown);
  neutralMats.push({mat:cMat,orig:cCol});
}
function mkTreeGhost(x,z,seed,sc=1,op=1){
  const h=(.45+pr(seed,1)*.45)*sc;
  const tg=new THREE.BoxGeometry(.07*sc,h*.35,.07*sc);
  const tm=new THREE.Mesh(tg,new THREE.MeshLambertMaterial({color:0xffffff,transparent:op<1,opacity:op}));
  tm.position.set(x,h*.175,z);scene.add(tm);
  const te=new THREE.LineSegments(new THREE.EdgesGeometry(tg),new THREE.LineBasicMaterial({color:EDGE_G,transparent:true,opacity:.15*op}));
  te.position.copy(tm.position);scene.add(te);
  const sm=new THREE.Mesh(new THREE.SphereGeometry((.18+pr(seed,2)*.12)*sc,5,4),new THREE.MeshLambertMaterial({color:0xffffff,transparent:op<1,opacity:op*.85}));
  sm.position.set(x,h*.55,z);scene.add(sm);
}
function duo(x,z,w,d,tot,zona,ud){
  const bh=H_BASE[zona],uh=Math.max(.05,tot-bh);
  const lo=mkBox(x,0,z,w,bh,d,C[zona].base);lo.userData=ud;allClickable.push(lo);
  const up=mkBox(x,bh,z,w,uh,d,C[zona].light);up.userData=ud;allClickable.push(up);
}
function duoGhost(x,z,w,d,tot,zona,op=1){
  const bh=H_BASE[zona],uh=Math.max(.05,tot-bh);
  mkBoxGhost(x,0,z,w,bh,d,op);mkBoxGhost(x,bh,z,w*.83,uh,d*.83,op*.85);
}

let maxT=false;
function buildBlock(side,col,row){
  const zona=ZONAS[col],bx=colX(side,col),bz=rowZ(row);
  const s=(side==='L'?0:500)+col*100+row*10;
  const ud={zona};
  mkFloor(bx,bz,BS+SW*2,BS+SW*2,SIDEWALK_C[zona],.007);
  mkFloor(bx,bz,BS-.04,BS-.04,FLOOR_C[zona],.009);
  const fm=new THREE.Mesh(new THREE.PlaneGeometry(BS-.04,BS-.04),new THREE.MeshLambertMaterial({color:FLOOR_C[zona]}));
  fm.rotation.x=-Math.PI/2;fm.position.set(bx,.011,bz);fm.userData=ud;fm.receiveShadow=true;
  scene.add(fm);allClickable.push(fm);
  neutralMats.push({mat:fm.material,orig:FLOOR_C[zona]});
  if(zona==='G0'){
    mkFloor(bx,bz,BS-.04,BS-.04,0x1e5212,.013);
    for(let t=0;t<10+Math.floor(pr(col,row,s)*8);t++)
      mkTree(bx+prR(-.46,.46,col,row,t+10)*(BS/2),bz+prR(-.46,.46,col,row,t+20)*(BS/2),s+t,prR(.8,1.3,col,row,t+30));
    return;
  }
  if(zona==='G1'){
    mkFloor(bx,bz,BS*.85,BS*.85,0x4aaa1e,.012);
    const n=3+Math.floor(pr(col,row,1)*3);
    const sl=[[-1,-.8],[.8,.8],[-.8,.9],[.85,-.85],[0,.5],[-.5,-.3],[.3,0]];
    for(let i=0;i<Math.min(n,sl.length);i++)
      duo(bx+sl[i][0]*.75+prR(-.05,.05,col,row,i+13),bz+sl[i][1]*.75+prR(-.05,.05,col,row,i+14),
        prR(.45,.72,col,row,i+10),prR(.42,.68,col,row,i+11),prR(H_RANGE.G1[0],H_RANGE.G1[1],col,row,i+12),'G1',ud);
    for(let t=0;t<3+Math.floor(pr(col,row,2)*4);t++)
      mkTree(bx+prR(-.44,.44,col,row,t+50)*(BS/2),bz+prR(-.44,.44,col,row,t+51)*(BS/2),s+t+200,.85);
    return;
  }
  if(zona==='G2'){
    mkFloor(bx,bz,BS*.8,BS*.8,0x90c020,.012);
    const n=4+Math.floor(pr(col,row,1)*3);
    const sl=[[-1,-.8],[.85,-.8],[-.85,.85],[.9,.85],[0,-.9],[0,.9],[-.5,0],[.5,0]];
    for(let i=0;i<Math.min(n,sl.length);i++)
      duo(bx+sl[i][0]*.78+prR(-.06,.06,col,row,i+13),bz+sl[i][1]*.78+prR(-.06,.06,col,row,i+14),
        prR(.58,.88,col,row,i+10),prR(.55,.82,col,row,i+11),prR(H_RANGE.G2[0],H_RANGE.G2[1],col,row,i+12),'G2',ud);
    for(let t=0;t<2+Math.floor(pr(col,row,2)*2);t++)
      mkTree(bx+prR(-.42,.42,col,row,t+60)*(BS/2),bz+prR(-.42,.42,col,row,t+61)*(BS/2),s+t+300,.8);
    return;
  }
  if(zona==='G3'){
    const wO=[.7,.85,1.0,1.15,.75,.95],dO=[.65,.9,.7,1.0,.8,.75];
    const sl=[[-1,-.85],[.88,-.85],[-.88,.88],[.92,.88],[0,-.88],[0,.9]];
    for(let i=0;i<Math.min(3+Math.floor(pr(col,row,1)*2),sl.length);i++)
      duo(bx+sl[i][0]*.82+prR(-.06,.06,col,row,i+13),bz+sl[i][1]*.82+prR(-.06,.06,col,row,i+14),
        wO[(col*3+row*7+i)%wO.length],dO[(col*5+row*3+i+2)%dO.length],prR(H_RANGE.G3[0],H_RANGE.G3[1],col,row,i+12),'G3',ud);
    return;
  }
  if(zona==='G4'){
    const pW=BS*.72,pD=BS*.72;
    const plo=mkBox(bx,0,bz,pW,H_BASE.G4,pD,C.G4.base);plo.userData=ud;allClickable.push(plo);
    const tH=prR(H_RANGE.G4[0],H_RANGE.G4[1],col,row,20)-H_BASE.G4;
    const pup=mkBox(bx,H_BASE.G4,bz,pW*TR,tH,pD*TR,C.G4.light);pup.userData=ud;allClickable.push(pup);
    duo(bx+prR(-.5,.5,col,row,30)*BS*.28,bz+prR(-.5,.5,col,row,31)*BS*.28,
      prR(.7,.95,col,row,32),prR(.65,.9,col,row,33),prR(H_RANGE.G4[0],H_RANGE.G4[1]-1,col,row,34),'G4',ud);
    return;
  }
  if(zona==='G5'){
    const pW=BS*.82,pD=BS*.82;
    const plo=mkBox(bx,0,bz,pW,H_BASE.G5,pD,C.G5.base);plo.userData=ud;allClickable.push(plo);
    const isMax=!maxT&&side==='L'&&col===5&&row===1;if(isMax)maxT=true;
    const tHf=isMax?H_RANGE.G5[1]:prR(8.0,9.5,col,row,20);
    const pup=mkBox(bx,H_BASE.G5,bz,pW*TR,tHf-H_BASE.G5,pD*TR,C.G5.light);pup.userData=ud;allClickable.push(pup);
    if(isMax)mkBox(bx,H_BASE.G5+tHf-H_BASE.G5,bz,.05,1.2,.05,0x888888);
    return;
  }
}

function animRoute(mesh,rt){
  rt.prog=(rt.prog+rt.speed)%1;
  const t2=rt.prog<.5?rt.prog*2:2-rt.prog*2;
  const p0=rt.pts[0],p1=rt.pts[1];
  mesh.position.set(p0.x+(p1.x-p0.x)*t2,.02,p0.z+(p1.z-p0.z)*t2);
  const dx=rt.prog<.5?p1.x-p0.x:p0.x-p1.x,dz=rt.prog<.5?p1.z-p0.z:p0.z-p1.z;
  if(Math.abs(dx)+Math.abs(dz)>.01)mesh.rotation.y=Math.atan2(dx,dz);
}

let drag=false,mpx=0,mpy=0,theta=Math.PI/2,phi=.58,radius=52;
const tgt=new THREE.Vector3(0,0,0);
function syncCam(){
  camera.position.set(tgt.x+radius*Math.sin(phi)*Math.sin(theta),tgt.y+radius*Math.cos(phi),tgt.z+radius*Math.sin(phi)*Math.cos(theta));
  camera.lookAt(tgt);
}
syncCam();
cv.addEventListener('mousedown',e=>{drag=true;mpx=e.clientX;mpy=e.clientY});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  theta-=(e.clientX-mpx)*.006;phi=Math.max(.12,Math.min(1.35,phi+(e.clientY-mpy)*.005));
  mpx=e.clientX;mpy=e.clientY;syncCam();
});
cv.addEventListener('wheel',e=>{radius=Math.max(10,Math.min(85,radius+e.deltaY*.07));syncCam();},{passive:true});
cv.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;mpx=e.touches[0].clientX;mpy=e.touches[0].clientY;}},{passive:true});
cv.addEventListener('touchend',()=>drag=false,{passive:true});
cv.addEventListener('touchmove',e=>{
  if(!drag||e.touches.length!==1)return;
  theta-=(e.touches[0].clientX-mpx)*.006;phi=Math.max(.12,Math.min(1.35,phi+(e.touches[0].clientY-mpy)*.005));
  mpx=e.touches[0].clientX;mpy=e.touches[0].clientY;syncCam();
},{passive:true});

// ── Raycaster ──
const rc=new THREE.Raycaster(),ms=new THREE.Vector2();
cv.addEventListener('click',e=>{
  if(drag)return;
  const rect=cv.getBoundingClientRect();
  ms.x=((e.clientX-rect.left)/W)*2-1;
  ms.y=-((e.clientY-rect.top)/HH)*2+1;
  rc.setFromCamera(ms,camera);
  const hits=rc.intersectObjects(allClickable);
  if(hits.length>0&&hits[0].object.userData.zona)showZona(hits[0].object.userData.zona);
});

function setLayer(k,btn){
  document.querySelectorAll('.lb').forEach(b=>b.classList.remove('active'));

  const def=LAYERS[k];
  const isNeutral=k==='neutral';
  allClickable.forEach(m=>{const z=m.userData.zona;if(z)m.material.color.setHex(isNeutral?0xffffff:def.gc(z));});

// ── Render SVG de sección transversal ──
function renderSimSVG(tipo){
  const d=SIM_DATA[tipo];
  const svg=document.getElementById('sim-svg');
  const W=600,H=220;
  const groundY=155; // Y del suelo
  const centerX=W/2;

  // Proporciones de la calle según tipo
  const calleW=Math.min(d.metros*6,320); // px totales de calle
  const calleX0=centerX-calleW/2;
  const calleX1=centerX+calleW/2;

  // Alturas de edificios
  const edH=d.edificioH;
  const podH=d.edificioPodiumH;
  const edW=75; // ancho visual edificio
  const podW=podH>0?edW*1.3:edW;

  // Colores
  const col=d.zonaCol;
  const colLight=lightenHex(col,0.45);
  const asfalto='#3a3a3a';
  const acera='#c8b898';
  const verde='#2e6e18';
  const brtVerde='#1a7a1a';

  let svgStr=``;

  // ── Fondo / cielo ──
  svgStr+=`<rect x="0" y="0" width="${W}" height="${H}" fill="#ffffff"/>`;

  // ── Edificio izquierdo ──
  const edLX=calleX0-edW;
  if(podH>0){
    // Podium
    svgStr+=`<rect x="${calleX0-podW}" y="${groundY-podH}" width="${podW}" height="${podH}" fill="${col}" rx="1"/>`;
    // Torre sobre podium
    const torreW=edW*0.7;
    const torreH=edH-podH;
    svgStr+=`<rect x="${calleX0-podW/2-torreW/2}" y="${groundY-edH}" width="${torreW}" height="${torreH}" fill="${colLight}" rx="1"/>`;
    // Líneas de pisos
    const nPisos=Math.floor(torreH/12);
    for(let i=1;i<nPisos;i++){
      const py=groundY-edH+i*12;
      svgStr+=`<line x1="${calleX0-podW/2-torreW/2}" y1="${py}" x2="${calleX0-podW/2+torreW/2}" y2="${py}" stroke="rgba(0,0,0,.12)" stroke-width=".8"/>`;
    }
    // Líneas podium
    const nPod=Math.floor(podH/14);
    for(let i=1;i<nPod;i++){
      const py=groundY-podH+i*14;
      svgStr+=`<line x1="${calleX0-podW}" y1="${py}" x2="${calleX0}" y2="${py}" stroke="rgba(0,0,0,.15)" stroke-width=".8"/>`;
    }
  } else {
    // Edificio simple
    svgStr+=`<rect x="${calleX0-edW}" y="${groundY-edH}" width="${edW}" height="${edH}" fill="${col}" rx="1"/>`;
    const nPisos=Math.floor(edH/14);
    for(let i=1;i<nPisos;i++){
      const py=groundY-edH+i*14;
      svgStr+=`<line x1="${calleX0-edW}" y1="${py}" x2="${calleX0}" y2="${py}" stroke="rgba(0,0,0,.12)" stroke-width=".8"/>`;
    }
  }
  // Etiqueta zona izq
  svgStr+=`<text x="${calleX0-edW/2-(podH>0?podW/2-edW/2:0)}" y="${groundY-12}" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-size="13" font-weight="700" fill="white">${d.zona}</text>`;

  // ── Edificio derecho (espejo) ──
  if(podH>0){
    svgStr+=`<rect x="${calleX1}" y="${groundY-podH}" width="${podW}" height="${podH}" fill="${col}" rx="1"/>`;
    const torreW=edW*0.7;
    const torreH=edH-podH;
    svgStr+=`<rect x="${calleX1+podW/2-torreW/2}" y="${groundY-edH}" width="${torreW}" height="${torreH}" fill="${colLight}" rx="1"/>`;
    const nPisos=Math.floor(torreH/12);
    for(let i=1;i<nPisos;i++){
      const py=groundY-edH+i*12;
      svgStr+=`<line x1="${calleX1+podW/2-torreW/2}" y1="${py}" x2="${calleX1+podW/2+torreW/2}" y2="${py}" stroke="rgba(0,0,0,.12)" stroke-width=".8"/>`;
    }
    const nPod=Math.floor(podH/14);
    for(let i=1;i<nPod;i++){
      const py=groundY-podH+i*14;
      svgStr+=`<line x1="${calleX1}" y1="${py}" x2="${calleX1+podW}" y2="${py}" stroke="rgba(0,0,0,.15)" stroke-width=".8"/>`;
    }
    svgStr+=`<text x="${calleX1+podW/2}" y="${groundY-12}" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-size="13" font-weight="700" fill="white">${d.zona}</text>`;
  } else {
    svgStr+=`<rect x="${calleX1}" y="${groundY-edH}" width="${edW}" height="${edH}" fill="${col}" rx="1"/>`;
    const nPisos=Math.floor(edH/14);
    for(let i=1;i<nPisos;i++){
      const py=groundY-edH+i*14;
      svgStr+=`<line x1="${calleX1}" y1="${py}" x2="${calleX1+edW}" y2="${py}" stroke="rgba(0,0,0,.12)" stroke-width=".8"/>`;
    }
    svgStr+=`<text x="${calleX1+edW/2}" y="${groundY-12}" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-size="13" font-weight="700" fill="white">${d.zona}</text>`;
  }

  // ── Suelo / acera ──
  svgStr+=`<rect x="0" y="${groundY}" width="${W}" height="${H-groundY}" fill="${acera}"/>`;
  svgStr+=`<rect x="${calleX0}" y="${groundY}" width="${calleW}" height="${H-groundY}" fill="${asfalto}"/>`;

  // ── Camellón central ──
  if(d.camellon){
    const camW=calleW*0.18;
    svgStr+=`<rect x="${centerX-camW/2}" y="${groundY}" width="${camW}" height="${H-groundY}" fill="${verde}" rx="0"/>`;
    // Árboles en camellón
    if(d.arboles){
      [-camW/4,camW/4].forEach(ox=>{
        const tx=centerX+ox;
        svgStr+=`<rect x="${tx-2}" y="${groundY-22}" width="4" height="22" fill="#5a3010" rx="1"/>`;
        svgStr+=`<ellipse cx="${tx}" cy="${groundY-28}" rx="10" ry="10" fill="#1a6a1a"/>`;
      });
    }
  }

  // ── Carril BRT ──
  if(d.brt){
    const brtW=calleW*0.15;
    // Línea verde BRT
    svgStr+=`<rect x="${centerX-brtW/2}" y="${groundY+2}" width="${brtW}" height="8" fill="${brtVerde}" rx="1"/>`;
    // Símbolo BRT
    svgStr+=`<text x="${centerX}" y="${groundY+9}" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-size="7" font-weight="700" fill="white">BRT</text>`;
    // Bus
    svgStr+=`<rect x="${centerX-8}" y="${groundY-22}" width="16" height="18" fill="#5abf28" rx="2"/>`;
    svgStr+=`<rect x="${centerX-7}" y="${groundY-20}" width="14" height="8" fill="rgba(255,255,255,.3)" rx="1"/>`;
  }

  // ── Vehículos en carriles ──
  const carColores=['#888','#aaa','#777','#999','#666','#bbb'];
  const nCarriles=d.carriles;
  const zonaVeh=d.brt?calleW*0.38:calleW*0.45;
  const carrilW=zonaVeh/Math.ceil(nCarriles/2);
  // Lado izquierdo (→)
  for(let i=0;i<Math.ceil(nCarriles/2);i++){
    const cx=calleX0+i*carrilW+carrilW/2;
    svgStr+=`<rect x="${cx-7}" y="${groundY-14}" width="14" height="10" fill="${carColores[i%carColores.length]}" rx="2"/>`;
    svgStr+=`<polygon points="${cx+7},${groundY-9} ${cx+11},${groundY-9} ${cx+9},${groundY-12}" fill="${carColores[i%carColores.length]}"/>`;
  }
  // Lado derecho (←)
  for(let i=0;i<Math.floor(nCarriles/2);i++){
    const cx=calleX1-i*carrilW-carrilW/2;
    svgStr+=`<rect x="${cx-7}" y="${groundY-14}" width="14" height="10" fill="${carColores[(i+2)%carColores.length]}" rx="2"/>`;
    svgStr+=`<polygon points="${cx-7},${groundY-9} ${cx-11},${groundY-9} ${cx-9},${groundY-12}" fill="${carColores[(i+2)%carColores.length]}"/>`;
  }

  // ── Peatones en aceras ──
  [[calleX0-18,groundY-12],[calleX1+10,groundY-12]].forEach(([px,py],i)=>{
    svgStr+=`<ellipse cx="${px}" cy="${py}" rx="3" ry="3" fill="#334"/>`;
    svgStr+=`<rect x="${px-2}" y="${py+3}" width="4" height="7" fill="#334" rx="1"/>`;
    svgStr+=`<ellipse cx="${px+10}" cy="${py+2}" rx="3" ry="3" fill="#665"/>`;
    svgStr+=`<rect x="${px+8}" y="${py+5}" width="4" height="7" fill="#665" rx="1"/>`;
  });

  // ── Árboles en aceras (T4/T5) ──
  if(d.arboles){
    [[calleX0-40,groundY],[calleX1+25,groundY]].forEach(([tx,ty])=>{
      svgStr+=`<rect x="${tx-2}" y="${ty-20}" width="4" height="20" fill="#5a3010" rx="1"/>`;
      svgStr+=`<ellipse cx="${tx}" cy="${ty-26}" rx="11" ry="11" fill="#2d7a2d"/>`;
    });
  }

  // ── Líneas punteadas de carril ──
  for(let i=1;i<nCarriles;i++){
    let lx;
    if(i<=Math.ceil(nCarriles/2)){
      lx=calleX0+i*carrilW;
    } else {
      lx=calleX1-(i-Math.ceil(nCarriles/2))*carrilW;
    }
    if(Math.abs(lx-centerX)>8){
      svgStr+=`<line x1="${lx}" y1="${groundY}" x2="${lx}" y2="${H}" stroke="#666" stroke-width=".8" stroke-dasharray="4,4"/>`;
    }
  }

  // ── Cota / medida ──
  const cotaY=H-8;
  svgStr+=`<line x1="${calleX0}" y1="${cotaY-4}" x2="${calleX0}" y2="${cotaY+4}" stroke="#333" stroke-width="1"/>`;
  svgStr+=`<line x1="${calleX1}" y1="${cotaY-4}" x2="${calleX1}" y2="${cotaY+4}" stroke="#333" stroke-width="1"/>`;
  svgStr+=`<line x1="${calleX0}" y1="${cotaY}" x2="${calleX1}" y2="${cotaY}" stroke="#333" stroke-width=".8"/>`;
  svgStr+=`<text x="${centerX}" y="${cotaY-3}" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-size="10" font-weight="600" fill="#333">${d.metros} metros</text>`;

  // ── Etiqueta tipo ──
  svgStr+=`<text x="${centerX}" y="22" text-anchor="middle" font-family="Space Grotesk,sans-serif" font-size="20" font-weight="700" fill="${col}">${tipo}</text>`;

  svg.innerHTML=svgStr;

  // Actualizar métricas
  actualizarMetricas(tipo,d);
}

function lightenHex(hex,amount){
  const num=parseInt(hex.replace('#',''),16);
  const r=Math.min(255,((num>>16)&0xff)+Math.round((255-((num>>16)&0xff))*amount));
  const g=Math.min(255,(((num>>8)&0xff))+Math.round((255-(((num>>8)&0xff)))*amount));
  const b=Math.min(255,((num&0xff))+Math.round((255-((num&0xff)))*amount));
  return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function simCambiarTipo(tipo,btn){
  simTipoActual=tipo;
  document.querySelectorAll('.sim-tipo-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderSimSVG(tipo);
}
window.simCambiarTipo=simCambiarTipo;

function abrirSimulador(){
  if(!document.getElementById('sim-overlay')) crearSimOverlay();
  const el=document.getElementById('sim-overlay');
  el.style.display='flex';
  simActivo=true;
  requestAnimationFrame(()=>el.classList.add('visible'));
}
window.abrirSimulador=abrirSimulador;

function cerrarSimulador(){
  const el=document.getElementById('sim-overlay');
  if(!el)return;
  el.classList.remove('visible');
  setTimeout(()=>{el.style.display='none';},300);
  simActivo=false;
}
window.cerrarSimulador=cerrarSimulador;

// ── Loop con render inteligente ──
let needsRender=true;
let frameCount=0;
cv.addEventListener('mousedown',()=>needsRender=true);
cv.addEventListener('touchstart',()=>needsRender=true,{passive:true});

// Escena lista — ocultar loading
if(window._loadDone) window._loadDone();

(function loop(){
  requestAnimationFrame(loop);
  frameCount++;
  // Vehículos y peatones siempre activos → siempre renderizar
  // En mobile reducimos a 30fps para ahorrar batería
  if(isMobile&&frameCount%2!==0) return;
  VEHICLES.forEach(({car,rt})=>animRoute(car,rt));
  animRoute(busMesh,busRt);
  PEOPLE.forEach(({mesh,rt})=>animRoute(mesh,rt));
  renderer.render(scene,camera);
})();

</script>
